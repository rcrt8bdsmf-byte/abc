<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="favicon.png" type="image/png">
<title>計分板 Pro Elite | 雲端全功能版</title>

<!-- 📱 PWA 設定 -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --bg: #0f172a; --mid: #1e293b; --red: #f43f5e; --gold: #fbbf24;
  --text: #f8fafc; --muted: #94a3b8; --bdr: rgba(255,255,255,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; touch-action: manipulation; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden; }
button { transition: all 0.2s; cursor: pointer; border: none; }
button:active { transform: scale(0.92); opacity: 0.8; }

/* 🔑 登入遮罩 */
#login-screen { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: var(--bg); z-index: 9999; display: flex; 
    align-items: center; justify-content: center; padding: 20px;
}
.login-box { background: var(--mid); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid var(--bdr); text-align: center; }
.auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--bdr); border-radius: 12px; color: white; margin-bottom: 12px; font-size: 16px; }

header { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--red); }
header h1 { font-family: 'Oswald'; font-size: 1.8rem; letter-spacing: 2px; color: #fff; }
.tabs { display: flex; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--bdr); }
.tab { padding: 16px; flex: 1; text-align: center; font-weight: 700; color: var(--muted); cursor: pointer; font-size: 0.9rem; }
.tab.active { color: var(--red); border-bottom: 3px solid var(--red); }

.panel { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
.panel.active { display: block; }
.card { background: var(--mid); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--bdr); }
.score-num { font-family: 'Oswald'; font-size: 3.5rem; font-weight: 700; color: #fff; }

.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; }
.pcard { background: var(--mid); border-radius: 20px; padding: 15px; border: 1px solid var(--bdr); border-left: 5px solid var(--red); }
.btn-in { background: #10b981; color: white; border-radius: 12px; padding: 12px 0; font-weight: 900; }

.history-item { margin-bottom: 12px; background: var(--mid); border-radius: 12px; overflow: hidden; border: 1px solid var(--bdr); }
.history-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.history-body { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; background: rgba(0,0,0,0.2); }
.history-body.active { max-height: 1500px; padding: 15px; border-top: 1px solid var(--bdr); }
table { width: 100%; border-collapse: collapse; text-align: center; margin-top: 10px; }
th, td { padding: 10px; border-bottom: 1px solid var(--bdr); }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 30px; border-radius: 40px; display: none; z-index: 2000; font-weight: bold; }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin-bottom:20px; font-family:'Oswald'; color:var(--red); letter-spacing:2px;">PRO DATA LOGIN</h2>
        <input type="email" id="auth-email" class="auth-input" placeholder="Email 地址">
        <input type="password" id="auth-password" class="auth-input" placeholder="密碼 (至少6位)">
        <button id="btn-login" class="auth-input" style="background:var(--red); font-weight:900; color:white; margin-top:10px;">進入系統 / 註冊帳號</button>
        <p style="font-size:0.75rem; color:var(--muted); margin-top:15px;">※ 首次登入將自動為您建立雲端空間</p>
    </div>
</div>

<header>
    <h1>BASKETBALL PRO</h1>
    <div id="user-info" style="font-size:0.7rem; color:var(--gold); margin-top:5px; font-weight:bold;"></div>
</header>

<div class="tabs">
    <div class="tab active" onclick="go('setup')">設定</div>
    <div class="tab" onclick="go('record')">紀錄</div>
    <div class="tab" onclick="go('history')">生涯紀錄</div>
    <div class="tab" id="btn-logout" style="color:var(--muted)">登出</div>
</div>

<div class="panel active" id="p-setup">
    <div class="card">
        <input type="text" id="g-team" value="我的球隊">
        <input type="text" id="g-opp" placeholder="對手隊名">
        <input type="date" id="g-date">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="number" id="p-num" placeholder="背號" style="flex:1" oninput="if(value.length>2)value=value.slice(0,2)">
            <input type="text" id="p-name" placeholder="球員姓名" style="flex:2">
        </div>
        <button onclick="addSinglePlayer()" style="width:100%; padding:12px; background:rgba(251,191,36,0.1); color:var(--gold); border:1px solid var(--gold); border-radius:12px; font-weight:bold;">+ 新增球員</button>
        <div id="p-list-preview" style="margin-top:15px; color:var(--muted); font-size:0.9rem;"></div>
    </div>
    <button onclick="startGame()" style="width:100%; padding:20px; background:var(--red); border-radius:16px; font-weight:900; font-size:1.2rem;">▶ 開始正式紀錄</button>
</div>

<div class="panel" id="p-record">
    <div class="card" style="text-align:center;">
        <span class="score-num" id="sb-us">0</span> <span style="font-size:1.5rem; opacity:0.3; margin:0 15px;">VS</span> <span class="score-num" id="sb-them">0</span>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
            <button onclick="adjThem(1)" style="padding:10px 20px; background:var(--mid); border-radius:10px; color:white; border:1px solid var(--bdr);">對手 +1</button>
            <button onclick="adjThem(-1)" style="padding:10px 20px; background:var(--mid); border-radius:10px; color:var(--red); border:1px solid var(--bdr);">修正 -1</button>
        </div>
    </div>
    <div id="pgrid" class="pgrid"></div>
    <button onclick="saveGame()" style="width:100%; padding:20px; background:var(--gold); color:#000; border-radius:16px; font-weight:900; margin-top:20px;">💾 結束比賽並同步至雲端</button>
</div>

<div class="panel" id="p-history">
    <div id="hist-list">讀取歷史數據中...</div>
</div>

<div id="toast"></div>

<script>
// --- 1. Firebase 初始化 (使用最新生成的 Key) ---
const firebaseConfig = {
  apiKey: "AIzaSyBOwJwfR1pNKqUkJ3pi8GVnIXscT4pKbcQ",
  authDomain: "prodata-a547a.firebaseapp.com",
  projectId: "prodata-a547a",
  storageBucket: "prodata-a547a.firebasestorage.app",
  messagingSenderId: "177275235931",
  appId: "1:177275235931:web:c49ab3f8f154402ddf597e",
  measurementId: "G-CBLGTRZ5HQ"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- 2. 登入邏輯與密碼提示功能 ---
document.getElementById('btn-login').onclick = async () => {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    if(!email || !password) return alert("請輸入完整帳號密碼");

    try {
        await auth.signInWithEmailAndPassword(email, password);
    } catch (e) {
        console.log("登入失敗狀態:", e.code);
        // 如果帳號不存在或憑證無效，嘗試註冊新帳號
        if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-login-credentials') {
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                alert("歡迎！已為您建立全新的雲端帳號。");
            } catch (createErr) {
                if (createErr.code === 'auth/weak-password') alert("註冊失敗：密碼太短，請至少輸入 6 位數。");
                else if (createErr.code === 'auth/email-already-in-use') alert("密碼錯誤：此帳號已存在，請輸入正確密碼。");
                else alert("存取失敗：" + createErr.message);
            }
        } else if (e.code === 'auth/wrong-password') {
            alert("密碼錯誤，請重新輸入。");
        } else {
            alert("登入異常：" + e.message);
        }
    }
};

document.getElementById('btn-logout').onclick = () => auth.signOut();

let currentUser = null;
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('user-info').innerText = '已登入：' + user.email;
        loadHistoryFromCloud();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        currentUser = null;
    }
});

// --- 3. 核心紀錄邏輯 (恢復所有功能) ---
let players = [], stats = {}, score = {us:0, them:0}, gInfo = {};
let historyData = [];

function go(id){
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    const tab = document.querySelector(`[onclick="go('${id}')"]`);
    if(tab) tab.classList.add('active');
}

function addSinglePlayer(){
    const n = document.getElementById('p-num').value;
    const nm = document.getElementById('p-name').value;
    if(!n || !nm) return;
    players.push({num:n, name:nm});
    document.getElementById('p-list-preview').innerText = "目前名單：" + players.map(p => `#${p.num} ${p.name}`).join(' | ');
    document.getElementById('p-num').value = ''; document.getElementById('p-name').value = '';
}

function startGame(){
    if(players.length === 0) return alert("請先加入球員");
    gInfo = { 
        team: document.getElementById('g-team').value, 
        opp: document.getElementById('g-opp').value || '對手', 
        date: document.getElementById('g-date').value || new Date().toISOString().slice(0,10) 
    };
    score = {us:0, them:0}; stats = {};
    players.forEach(p => { 
        stats[p.name] = { pts:0, f3m:0, f2m:0, ftm:0, num: p.num }; 
    });
    refreshUI(); go('record');
}

function refreshUI(){
    document.getElementById('sb-us').innerText = score.us;
    document.getElementById('sb-them').innerText = score.them;
    let h = '';
    players.forEach(p => {
        const s = stats[p.name];
        h += `<div class="pcard">
            <div style="font-weight:900; margin-bottom:10px;">#${s.num} ${p.name} - <span style="color:var(--red);">${s.pts}分</span></div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                <button class="btn-in" onclick="upS('${p.name}',3)">+3</button>
                <button class="btn-in" onclick="upS('${p.name}',2)">+2</button>
                <button class="btn-in" onclick="upS('${p.name}',1)">+1</button>
            </div>
        </div>`;
    });
    document.getElementById('pgrid').innerHTML = h;
}

function upS(name, p){
    stats[name].pts += p;
    score.us += p;
    refreshUI();
}

function adjThem(v){ score.them = Math.max(0, score.them+v); refreshUI(); }

// --- 4. 雲端同步與歷史紀錄 ---
async function saveGame(){
    if(!currentUser) return;
    if(!confirm("確定要儲存並同步至雲端？")) return;
    try {
        await db.collection('user_matches').add({
            owner: currentUser.uid,
            info: gInfo,
            score: score,
            players: players,
            stats: stats,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast("同步成功 ✓");
        loadHistoryFromCloud();
        go('history');
    } catch (e) {
        alert("同步失敗：" + e.message);
    }
}

async function loadHistoryFromCloud(){
    if(!currentUser) return;
    try {
        const snap = await db.collection('user_matches')
            .where('owner', '==', currentUser.uid)
            .orderBy('timestamp', 'desc')
            .get();
        historyData = snap.docs.map(doc => doc.data());
        drawHistory();
    } catch (e) {
        document.getElementById('hist-list').innerHTML = "暫無資料";
    }
}

function drawHistory(){
    const container = document.getElementById('hist-list');
    if(historyData.length === 0){ container.innerHTML = "尚未有歷史數據"; return; }
    
    container.innerHTML = historyData.map(g => `
        <div class="history-item">
            <div class="history-header" onclick="this.nextElementSibling.classList.toggle('active')">
                <div><b>${g.info.team} ${g.score.us}:${g.score.them} ${g.info.opp}</b><br><small>${g.info.date}</small></div>
                <div style="color:var(--gold)">▼</div>
            </div>
            <div class="history-body">
                <table>
                    <tr><th>#</th><th>球員</th><th>得分</th></tr>
                    ${g.players.map(p => `<tr><td>${p.num}</td><td>${p.name}</td><td>${g.stats[p.name].pts}</td></tr>`).join('')}
                </table>
            </div>
        </div>
    `).join('');
}

function showToast(m){
    const t = document.getElementById('toast');
    t.innerText = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
}
</script>
</body>
</html>
