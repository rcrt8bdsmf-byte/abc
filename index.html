<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="favicon.png" type="image/png">
<meta name="description" content="籃球比賽紀錄專業工具，支援雲端同步與戰報匯出。">
<title>計分板 Pro Elite | 雲端帳號版</title>

<!-- 📱 PWA App 設定 -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="計分板 Pro">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --bg: #0f172a; --mid: #1e293b; --red: #f43f5e; --gold: #fbbf24;
  --text: #f8fafc; --muted: #94a3b8; --bdr: rgba(255,255,255,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; touch-action: manipulation; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }
button { transition: all 0.2s; cursor: pointer; border: none; }
button:active { transform: scale(0.92); opacity: 0.8; }

/* 🔑 登入遮罩 */
#login-screen { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: var(--bg); z-index: 9999; display: flex; 
    align-items: center; justify-content: center; padding: 20px;
}
.login-box { background: var(--mid); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid var(--bdr); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.auth-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--bdr); border-radius: 12px; color: white; margin-bottom: 12px; font-size: 16px; }

header { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--red); }
header h1 { font-family: 'Oswald'; font-size: 1.8rem; letter-spacing: 2px; color: #fff; }
.tabs { display: flex; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--bdr); }
.tab { padding: 16px; flex: 1; text-align: center; font-weight: 700; color: var(--muted); cursor: pointer; font-size: 0.9rem; }
.tab.active { color: var(--red); border-bottom: 3px solid var(--red); }

.panel { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
.panel.active { display: block; }
.card { background: var(--mid); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--bdr); }
.score-num { font-family: 'Oswald'; font-size: 3.5rem; font-weight: 700; color: #fff; }

.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; }
.pcard { background: var(--mid); border-radius: 20px; padding: 15px; border: 1px solid var(--bdr); border-left: 5px solid var(--red); }
.btn-in { background: #10b981; color: white; border-radius: 12px; padding: 12px 0; font-weight: 900; }

.history-item { margin-bottom: 12px; background: var(--mid); border-radius: 12px; overflow: hidden; border: 1px solid var(--bdr); }
.history-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.history-body { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; background: rgba(0,0,0,0.2); }
.history-body.active { max-height: 1500px; padding: 15px; border-top: 1px solid var(--bdr); }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 30px; border-radius: 40px; display: none; z-index: 2000; font-weight: bold; }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin-bottom:20px; font-family:'Oswald'; color:var(--red); letter-spacing:2px;">PRO DATA LOGIN</h2>
        <input type="email" id="auth-email" class="auth-input" placeholder="Email 地址">
        <input type="password" id="auth-password" class="auth-input" placeholder="密碼 (至少6位)">
        <button id="btn-login" class="auth-input" style="background:var(--red); font-weight:900; color:white; margin-top:10px;">進入系統 / 註冊帳號</button>
        <p style="font-size:0.75rem; color:var(--muted); margin-top:15px;">※ 首次登入將自動建立專屬雲端帳號</p>
    </div>
</div>

<header>
    <h1>BASKETBALL PRO</h1>
    <div id="user-info" style="font-size:0.7rem; color:var(--gold); margin-top:5px; font-weight:bold;"></div>
</header>

<div class="tabs">
    <div class="tab active" onclick="go('setup')">設定</div>
    <div class="tab" onclick="go('record')">紀錄</div>
    <div class="tab" onclick="go('history')">分析紀錄</div>
    <div class="tab" id="btn-logout" style="color:var(--muted)">登出</div>
</div>

<div class="panel active" id="p-setup">
    <div class="card">
        <div style="font-size:0.8rem; color:var(--gold); margin-bottom:10px; font-weight:bold;">比賽資訊</div>
        <input type="text" id="g-team" value="我的球隊">
        <input type="text" id="g-opp" placeholder="對手隊名">
        <input type="date" id="g-date">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="number" id="p-num" placeholder="背號" style="flex:1" oninput="if(value.length>2)value=value.slice(0,2)">
            <input type="text" id="p-name" placeholder="球員姓名" style="flex:2">
        </div>
        <button onclick="addSinglePlayer()" style="width:100%; padding:12px; background:rgba(251,191,36,0.1); color:var(--gold); border:1px solid var(--gold); border-radius:12px; font-weight:bold;">+ 新增球員</button>
        <div id="p-list-preview" style="margin-top:15px; color:var(--muted); font-size:0.9rem;"></div>
    </div>
    <button onclick="startGame()" style="width:100%; padding:20px; background:var(--red); border-radius:16px; font-weight:900; font-size:1.2rem; box-shadow: 0 4px 15px rgba(244,63,94,0.3);">▶ 開始正式紀錄</button>
</div>

<div class="panel" id="p-record">
    <div class="card" style="text-align:center; background:linear-gradient(145deg, #1e293b, #0f172a);">
        <span class="score-num" id="sb-us">0</span> <span style="font-size:1.5rem; opacity:0.3; margin:0 15px;">VS</span> <span class="score-num" id="sb-them">0</span>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
            <button onclick="adjThem(1)" style="padding:10px 20px; background:var(--panel); color:white; border-radius:10px; font-weight:bold;">對手 +1</button>
            <button onclick="adjThem(-1)" style="padding:10px 20px; background:rgba(244,63,94,0.2); color:var(--red); border-radius:10px; font-weight:bold;">-1 修正</button>
        </div>
    </div>
    <div id="pgrid" class="pgrid"></div>
    <button onclick="saveGame()" style="width:100%; padding:20px; background:var(--gold); color:#000; border-radius:16px; font-weight:900; margin-top:20px; box-shadow: 0 4px 15px rgba(251,191,36,0.3);">💾 結束比賽並同步雲端</button>
</div>

<div class="panel" id="p-history">
    <div id="hist-list" style="text-align:center; padding:40px; opacity:0.5;">同步中...</div>
</div>

<div id="toast"></div>

<script>
// 📋 --- 1. Firebase 初始化 (使用最新生成的金鑰) ---
const firebaseConfig = {
  apiKey: "AIzaSyBOwJwfR1pNKqUkJ3pi8GVnIXscT4pKbcQ",
  authDomain: "prodata-a547a.firebaseapp.com",
  projectId: "prodata-a547a",
  storageBucket: "prodata-a547a.firebasestorage.app",
  messagingSenderId: "177275235931",
  appId: "1:177275235931:web:c49ab3f8f154402ddf597e",
  measurementId: "G-CBLGTRZ5HQ"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 📋 --- 2. 帳號與同步邏輯 ---
let currentUser = null;

document.getElementById('btn-login').onclick = async () => {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    if(!email || !password) return alert("請輸入完整帳密");
    try {
        await auth.signInWithEmailAndPassword(email, password);
    } catch (e) {
        // 修正新版 Firebase 的錯誤代碼捕捉，讓自動註冊能順利進行
        if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-login-credentials') {
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                showToast("新帳號建立成功！");
            } catch (createErr) {
                if (createErr.code === 'auth/weak-password') alert("密碼太短，請至少輸入 6 位數。");
                else alert("無法建立帳號：" + createErr.message);
            }
        } else {
            alert('登入失敗：' + e.message);
        }
    }
};

document.getElementById('btn-logout').onclick = () => auth.signOut();

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('user-info').innerText = '帳戶：' + user.email;
        loadHistoryFromCloud();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        currentUser = null;
    }
});

// 📋 --- 3. 核心紀錄功能 (恢復完整屬性統計) ---
let players = [], stats = {}, score = {us:0, them:0}, gInfo = {};
let historyData = [];

function go(id){
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    const targetTab = document.querySelector(`[onclick="go('${id}')"]`);
    if(targetTab) targetTab.classList.add('active');
}

function addSinglePlayer(){
    const n = document.getElementById('p-num').value;
    const nm = document.getElementById('p-name').value;
    if(!n || !nm) return;
    players.push({num:n, name:nm});
    document.getElementById('p-list-preview').innerText = "名單：" + players.map(p => `#${p.num} ${p.name}`).join(' | ');
    document.getElementById('p-num').value = ''; document.getElementById('p-name').value = '';
}

function startGame(){
    if(players.length === 0) return alert("名單為空");
    gInfo = { team: document.getElementById('g-team').value, opp: document.getElementById('g-opp').value || '對手', date: document.getElementById('g-date').value || new Date().toISOString().slice(0,10) };
    score = {us:0, them:0}; stats = {};
    players.forEach(p => { 
        stats[p.name] = { pts:0, f3m:0, f3a:0, f2m:0, f2a:0, ftm:0, fta:0, ast:0, blk:0, num: p.num }; 
    });
    refreshUI(); go('record');
}

function refreshUI(){
    document.getElementById('sb-us').innerText = score.us;
    document.getElementById('sb-them').innerText = score.them;
    let h = '';
    players.forEach(p => {
        const s = stats[p.name];
        h += `<div class="pcard">
            <div style="font-weight:900; margin-bottom:10px; font-size:1.1rem; color:var(--gold);">#${s.num} ${p.name} <span style="float:right; color:var(--red);">${s.pts}分</span></div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                <button class="btn-in" onclick="upS('${p.name}','f3',1)">+3</button>
                <button class="btn-in" onclick="upS('${p.name}','f2',1)">+2</button>
                <button class="btn-in" onclick="upS('${p.name}','ft',1)">+1</button>
            </div>
        </div>`;
    });
    document.getElementById('pgrid').innerHTML = h;
}

function upS(name, type, hit){
    const s = stats[name]; s[type+'m']++; s[type+'a']++;
    let p = type==='f3'?3:(type==='f2'?2:1);
    s.pts += p; score.us += p; refreshUI();
}

function adjThem(v){ score.them = Math.max(0, score.them+v); refreshUI(); }

// 📋 --- 4. 雲端同步與歷史數據 ---
async function saveGame(){
    if(!currentUser) return alert("請先登入");
    if(!confirm("確定要儲存比賽數據至雲端？")) return;
    
    const matchData = {
        owner: currentUser.uid,
        info: gInfo,
        score: score,
        players: players,
        stats: stats,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    try {
        await db.collection('user_matches').add(matchData);
        showToast("雲端儲存成功！");
        loadHistoryFromCloud();
        go('history');
    } catch (e) {
        alert("儲存失敗：" + e.message);
    }
}

async function loadHistoryFromCloud(){
    if(!currentUser) return;
    const listDiv = document.getElementById('hist-list');
    try {
        const snapshot = await db.collection('user_matches')
            .where('owner', '==', currentUser.uid)
            .orderBy('timestamp', 'desc')
            .get();
        
        historyData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        drawHistory();
    } catch (e) {
        listDiv.innerHTML = "紀錄載入失敗，請確認資料庫權限。";
    }
}

function drawHistory(){
    const container = document.getElementById('hist-list');
    if(historyData.length === 0){ container.innerHTML = "尚無比賽紀錄"; return; }
    
    container.innerHTML = historyData.map((g, i) => `
        <div class="history-item">
            <div class="history-header" onclick="toggleH(this)">
                <div><b style="font-size:1.1rem;">${g.info.team} ${g.score.us}:${g.score.them} ${g.info.opp}</b><br><small style="color:var(--muted);">${g.info.date}</small></div>
                <div style="color:var(--gold)">▼</div>
            </div>
            <div class="history-body">
                <table style="width:100%; border-collapse:collapse; margin-top:10px;">
                    <tr style="color:var(--muted); border-bottom:1px solid var(--bdr);">
                        <th style="padding:10px;">#</th><th style="padding:10px;">姓名</th><th style="padding:10px;">得分</th><th style="padding:10px;">助攻/阻攻</th>
                    </tr>
                    ${g.players.map(p => `
                    <tr style="border-bottom:1px solid var(--bdr);">
                        <td style="padding:10px;">${p.num}</td>
                        <td style="padding:10px;">${p.name}</td>
                        <td style="padding:10px; color:var(--red); font-weight:bold;">${g.stats[p.name].pts}</td>
                        <td style="padding:10px;">${g.stats[p.name].ast || 0}/${g.stats[p.name].blk || 0}</td>
                    </tr>`).join('')}
                </table>
            </div>
        </div>
    `).join('');
}

function toggleH(el){
    const body = el.nextElementSibling;
    body.classList.toggle('active');
    el.querySelector('div:last-child').style.transform = body.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
}

function showToast(m){
    const t = document.getElementById('toast');
    t.innerText = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
