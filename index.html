<style>
:root{
  --bg: #0f172a; --mid: #1e293b; --panel: #334155;
  --red: #f43f5e; --red-glow: rgba(244, 63, 94, 0.4);
  --gold: #fbbf24; --green: #10b981;
  --text: #f8fafc; --muted: #94a3b8; --bdr: rgba(255,255,255,0.06);
}
button, .tab, .card, input { 
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
    touch-action: manipulation; 
}
button:active { transform: scale(0.92); opacity: 0.8; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden; }
header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); border-bottom: 2px solid var(--red); }
header h1 { font-family: 'Oswald', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px var(--red-glow); }
.tabs { display: flex; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--bdr); }
.tab { padding: 16px; font-size: 0.95rem; font-weight: 700; color: var(--muted); flex: 1; text-align: center; cursor: pointer; position: relative; }
.tab.active { color: var(--red); }
.tab.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: var(--red); border-radius: 10px 10px 0 0; box-shadow: 0 -2px 10px var(--red); }
.panel { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.panel.active { display: block; }
.card { background: var(--mid); border: 1px solid var(--bdr); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--bdr); border-radius: 12px; color: white; margin-bottom: 12px; font-size: 16px; }
input:focus { border-color: var(--red); background: rgba(0,0,0,0.3); outline: none; }
.import-flex { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.import-flex input:nth-child(1) { flex: 1; min-width: 80px; } 
.import-flex input:nth-child(2) { flex: 3; min-width: 180px; } 
@media (max-width: 480px) { .import-flex { flex-direction: column; gap: 0; } .import-flex input { width: 100%; } }
.player-list-preview { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; margin-top: 10px; font-size: 0.9rem; }
.player-item { display: inline-flex; align-items: center; background: var(--panel); padding: 6px 12px; border-radius: 8px; margin: 4px; border: 1px solid var(--bdr); color: var(--accent); font-weight: 700; }
.btn-del-player { margin-left: 8px; color: var(--red); cursor: pointer; font-size: 1.2rem; }
.scoreboard { display: grid; grid-template-columns: 1fr 0.3fr 1fr; align-items: center; text-align: center; background: linear-gradient(145deg, #334155, #1e293b); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
.score-num { font-family: 'Oswald', sans-serif; font-size: 4rem; font-weight: 700; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
.opp-btns { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
.opp-btns button { padding: 8px 14px; font-size: 0.8rem; font-weight: 900; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--bdr); }
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.pcard { background: var(--mid); border-radius: 24px; padding: 18px; border: 1px solid var(--bdr); position: relative; overflow: hidden; }
.pcard::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--red); }
.pcard-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.btn-edit-small { font-size: 0.75rem; color: var(--muted); border: 1px solid var(--bdr); padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); }
.pct-display { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 15px; text-align: center; }
.pct-val { font-family: 'Oswald', sans-serif; font-weight: bold; color: var(--green); display: block; font-size: 1rem; }
.btn-group-score { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
.btn-in { background: #10b981; color: white; border: none; padding: 14px 0; border-radius: 14px; font-weight: 900; font-size: 1.1rem; }
.btn-out { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--bdr); padding: 10px 0; border-radius: 14px; font-size: 0.75rem; }
.btn-group-other { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.btn-stat { background: var(--panel); color: #fff; border: 1px solid var(--bdr); border-radius: 12px; padding: 10px 0; font-size: 0.7rem; position: relative; }
.btn-minus { position: absolute; top: -8px; right: -8px; background: var(--red); color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--mid); }
.history-item { margin-bottom: 15px; }
.history-card-header { cursor: pointer; border-left: 6px solid var(--red); display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--mid); border-radius: 12px; }
.history-content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); background: var(--mid); border-radius: 0 0 20px 20px; border: 1px solid var(--bdr); border-top: none; }
.history-content.active { max-height: 2000px; transition: max-height 0.8s ease-in-out; padding: 20px; margin-bottom: 20px; }
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
.modal-content { background: var(--mid); padding: 30px; border-radius: 28px; width: 100%; max-width: 420px; border: 1px solid var(--red); }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
.tw { overflow-x: auto; border-radius: 15px; border: 1px solid var(--bdr); }
table { width: 100%; border-collapse: collapse; min-width: 900px; background: rgba(255,255,255,0.01); }
th, td { padding: 16px 10px; text-align: center; border-bottom: 1px solid var(--bdr); }
th { background: rgba(255,255,255,0.05); color: var(--muted); font-size: 0.75rem; font-weight: 900; }
.info-section { font-size: 0.85rem; color: var(--muted); line-height: 1.8; margin-top: 40px; border-top: 1px solid var(--bdr); padding-top: 20px; }
.info-section h4 { color: var(--text); margin-bottom: 8px; }
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 12px 30px; border-radius: 40px; font-weight: 900; display: none; z-index: 2000; }
.btn-main-red { width: 100%; background: var(--red); color: white; border: none; border-radius: 16px; padding: 18px; font-size: 1.1rem; font-weight: 900; box-shadow: 0 6px 0 #9f1239; }
.btn-main-gold { width: 100%; background: var(--gold); color: #000; border: none; border-radius: 16px; padding: 18px; font-size: 1.1rem; font-weight: 900; box-shadow: 0 6px 0 #b45309; }
#export-area { position: absolute; left: -9999px; width: 1000px; background: white; color: black; padding: 30px; }
</style>
</head>
<body>

<header><h1>專業計分板</h1></header>

<div class="tabs">
    <div class="tab active" onclick="go('setup')">設定</div>
    <div class="tab" onclick="go('record')">紀錄</div>
    <div class="tab" onclick="go('history')">歷史數據</div>
</div>

<div class="panel active" id="p-setup">
    <div class="card">
        <div style="font-size:0.8rem; color:var(--gold); margin-bottom:12px; font-weight:900;">比賽基本資訊</div>
        <input type="text" id="g-team" value="我方球隊">
        <input type="text" id="g-opp" placeholder="對手球隊名稱">
        <input type="date" id="g-date">
    </div>
    
    <div class="card">
        <div style="font-size:0.8rem; color:var(--gold); margin-bottom:12px; font-weight:900;">球員名單匯入</div>
        <div class="import-flex">
            <input type="number" id="p-num" placeholder="背號" oninput="if(value.length>2)value=value.slice(0,2); if(value<0)value=0">
            <input type="text" id="p-name" placeholder="球員姓名">
        </div>
        <button class="btn-ui" style="width:100%; background:rgba(251, 191, 36, 0.1); color:var(--gold); border:1px solid var(--gold); border-radius:12px; padding:12px; font-weight:bold;" onclick="addSinglePlayer()">+ 新增球員</button>
        
        <div id="player-preview-container" style="display:none;">
            <div style="font-size:0.75rem; color:var(--muted); margin-bottom:8px; font-weight:700; margin-top:15px;">已加入名單（點擊 ✖ 修改）：</div>
            <div id="player-list-preview" class="player-list-preview"></div>
            <button style="background:none; border:none; color:var(--red); font-size:0.75rem; cursor:pointer; margin-top:10px; font-weight:bold;" onclick="clearPlayers()">清空名單</button>
        </div>
    </div>
    
    <button class="btn-main-red btn-ui" onclick="startGame()">▶ 開始比賽</button>

    <div class="info-section">
        <h4>💡 使用說明</h4>
        <p>1. 在設定分頁匯入球員背號與姓名。<br>2. 紀錄分頁中點擊「+X」代表命中，點擊「X失」代表投丟，系統自動計算命中率。<br>3. 比賽結束後儲存數據，可在歷史數據分頁下載圖片戰報。</p>
        <h4 style="margin-top:15px;">🔒 隱私政策</h4>
        <p>本站為純前端工具，所有數據僅儲存在您的瀏覽器本地（Local Storage），不會上傳至任何伺服器。清除瀏覽器快取將會移除歷史紀錄。</p>
    </div>
</div>

<div class="panel" id="p-record">
    <div class="scoreboard card">
        <div><small id="txt-us" style="color:var(--muted); font-weight:900; display:block;">我方</small><span class="score-num" id="sb-us">0</span></div>
        <div style="font-size:1.2rem; color:var(--muted); font-weight:900; font-family:'Oswald'">VS</div>
        <div>
            <small id="txt-them" style="color:var(--muted); font-weight:900; display:block;">對手</small><span class="score-num" id="sb-them">0</span>
            <div class="opp-btns">
                <button class="btn-ui" onclick="adjThem(3)">+3</button>
                <button class="btn-ui" onclick="adjThem(2)">+2</button>
                <button class="btn-ui" onclick="adjThem(1)">+1</button>
                <button class="btn-ui" onclick="adjThem(-1)">-1</button>
            </div>
        </div>
    </div>
    <div class="pgrid" id="pgrid"></div>
    <button class="btn-main-gold btn-ui" style="margin-top:25px;" onclick="saveGame()">💾 儲存本場比賽數據</button>
</div>

<div class="panel" id="p-history">
    <div id="hist-list"></div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3 id="editPlayerName" style="color:var(--gold); margin-bottom:10px; font-weight:900;">修正球員數據</h3>
        <div class="modal-grid" id="editInputs"></div>
        <div style="margin-top:25px; display:flex; gap:12px;">
            <button class="btn-ui" style="flex:1; background:rgba(255,255,255,0.1); color:white; border:none; padding:12px; border-radius:12px; font-weight:bold;" onclick="closeModal()">取消</button>
            <button class="btn-ui" style="flex:1; background:var(--gold); color:#000; border:none; padding:12px; border-radius:12px; font-weight:900;" onclick="confirmEdit()">儲存修正</button>
        </div>
    </div>
</div>

<div id="export-area">
    <h2 id="exp-title">成績單</h2>
    <p id="exp-meta"></p>
    <table border="1" style="width:100%; border-collapse:collapse; margin-top:20px; text-align:center; font-family: sans-serif;">
        <thead>
            <tr style="background:#eee;">
                <th>#</th><th>球員</th><th>得分</th><th>三分</th><th>兩分</th><th>罰球</th><th>助</th><th>阻</th><th>抄</th><th>失</th><th>犯</th>
            </tr>
        </thead>
        <tbody id="exp-body"></tbody>
    </table>
</div>

<div id="toast"></div>

<script>
let players = [], stats = {}, score = {us:0, them:0}, gInfo = {};
let historyData = JSON.parse(localStorage.getItem('basket_pro_v5') || '[]');
let currentEditName = "";

function go(id){
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const tab = document.querySelector(`[onclick="go('${id}')"]`);
    if(tab) tab.classList.add('active');
    document.getElementById('p-'+id).classList.add('active');
    if(id==='history') drawHistoryList();
}

function addSinglePlayer(){
    const numInput = document.getElementById('p-num');
    const nameInput = document.getElementById('p-name');
    let num = numInput.value.trim();
    const name = nameInput.value.trim();
    if(!num || !name) return alert("請同時輸入號碼與姓名");
    if(num < 0) num = "0"; 
    if(players.some(p => p.name === name)) return alert("球員姓名重複了");
    players.push({ num: num, name: name });
    numInput.value = ""; nameInput.value = ""; numInput.focus();
    updatePlayerPreview();
}

function removePlayer(idx){
    players.splice(idx, 1);
    updatePlayerPreview();
}

function updatePlayerPreview(){
    const container = document.getElementById('player-preview-container');
    const list = document.getElementById('player-list-preview');
    if(players.length > 0){
        container.style.display = 'block';
        list.innerHTML = players.map((p, i) => `
            <span class="player-item">#${p.num} ${p.name} 
                <span class="btn-del-player" onclick="removePlayer(${i})">✖</span>
            </span>`).join('');
    } else {
        container.style.display = 'none';
    }
}

function clearPlayers(){
    if(confirm("確定要清空已加入的名單嗎？")){
        players = [];
        updatePlayerPreview();
    }
}

function startGame(){
    if(players.length === 0) return alert("請先匯入名單");
    gInfo = {
        team: document.getElementById('g-team').value,
        opp: document.getElementById('g-opp').value || '對手',
        date: document.getElementById('g-date').value || new Date().toISOString().slice(0,10)
    };
    score = {us:0, them:0};
    stats = {};
    players.forEach(p => {
        stats[p.name] = { pts:0, f3m:0, f3a:0, f2m:0, f2a:0, ftm:0, fta:0, ast:0, blk:0, stl:0, to:0, foul:0, num: p.num };
    });
    document.getElementById('txt-us').innerText = gInfo.team;
    document.getElementById('txt-them').innerText = gInfo.opp;
    refreshUI();
    go('record');
}

function refreshUI(){
    document.getElementById('sb-us').innerText = score.us;
    document.getElementById('sb-them').innerText = score.them;
    let h = '';
    players.forEach(p => {
        const s = stats[p.name];
        h += `<div class="pcard">
            <div class="pcard-hdr">
                <strong><span style="color:var(--accent); font-family:'Oswald'; margin-right:5px;">#${s.num}</span> ${p.name}</strong>
                <button class="btn-edit-small btn-ui" onclick="openEdit('${p.name}')">修正 ✎</button>
            </div>
            <div class="pct-display">
                <div>三分<span class="pct-val">${pct(s.f3m,s.f3a)}</span></div>
                <div>兩分<span class="pct-val">${pct(s.f2m,s.f2a)}</span></div>
                <div>罰球<span class="pct-val">${pct(s.ftm,s.fta)}</span></div>
                <div style="grid-column: span 3; margin-top:8px; border-top:1px solid rgba(255,255,255,0.1); padding-top:8px;">
                    個人得分: <b style="color:var(--red); font-size:1.2rem; font-family:'Oswald'">${s.pts}</b>
                </div>
            </div>
            <div class="btn-group-score">
                <button class="btn-in btn-ui" onclick="upS('${p.name}','f3',1)">+3</button>
                <button class="btn-in btn-ui" onclick="upS('${p.name}','f2',1)">+2</button>
                <button class="btn-in btn-ui" onclick="upS('${p.name}','ft',1)">+1</button>
                <button class="btn-out btn-ui" onclick="upS('${p.name}','f3',0)">3分失</button>
                <button class="btn-out btn-ui" onclick="upS('${p.name}','f2',0)">2分失</button>
                <button class="btn-out btn-ui" onclick="upS('${p.name}','ft',0)">罰球失</button>
            </div>
            <div class="btn-group-other">
                ${['ast','blk','stl','to','foul'].map(k => `
                    <button class="btn-stat btn-ui" onclick="upO('${p.name}','${k}',1)">
                        ${lbl(k)}<br>${s[k]}
                        <div class="btn-minus btn-ui" onclick="event.stopPropagation(); upO('${p.name}','${k}',-1)">-</div>
                    </button>
                `).join('')}
            </div>
        </div>`;
    });
    document.getElementById('pgrid').innerHTML = h;
}

function lbl(k){ return {ast:'助攻',blk:'火鍋',stl:'抄截',to:'失誤',foul:'犯規'}[k]; }
function pct(m,a){ return a===0 ? "0%" : `${Math.round((m/a)*100)}%`; }

function upS(name, type, hit){
    const s = stats[name];
    if(hit){
        s[type+'m']++; s[type+'a']++;
        let p = type==='f3'?3:(type==='f2'?2:1);
        s.pts += p; score.us += p;
    } else { 
        s[type+'a']++; 
    }
    refreshUI();
}

function upO(name, type, v){
    stats[name][type] = Math.max(0, stats[name][type] + v);
    refreshUI();
}

function adjThem(v){ score.them = Math.max(0, score.them+v); refreshUI(); }

function openEdit(name){
    currentEditName = name;
    document.getElementById('editPlayerName').innerText = `修正 #${stats[name].num} ${name} 數據`;
    const fields = [
        {k:'f3m', l:'3分命中'}, {k:'f3a', l:'3分出手'},
        {k:'f2m', l:'2分命中'}, {k:'f2a', l:'2分出手'},
        {k:'ftm', l:'罰球命中'}, {k:'fta', l:'罰球出手'},
        {k:'ast', l:'助攻'}, {k:'blk', l:'火鍋'},
        {k:'stl', l:'抄截'}, {k:'to', l:'失誤'}, {k:'foul', l:'犯規'}
    ];
    let h = '';
    fields.forEach(f => {
        h += `<div><label>${f.l}</label><input type="number" id="edit_${f.k}" value="${stats[name][f.k]}"></div>`;
    });
    document.getElementById('editInputs').innerHTML = h;
    document.getElementById('editModal').style.display = 'flex';
}

function confirmEdit(){
    const s = stats[currentEditName];
    const fields = ['f3m','f3a','f2m','f2a','ftm','fta','ast','blk','stl','to','foul'];
    fields.forEach(f => {
        let val = parseInt(document.getElementById(`edit_${f}`).value) || 0;
        s[f] = Math.max(0, val);
    });
    if(s.f3m > s.f3a) s.f3m = s.f3a;
    if(s.f2m > s.f2a) s.f2m = s.f2a;
    if(s.ftm > s.fta) s.ftm = s.fta;
    s.pts = (s.f3m * 3) + (s.f2m * 2) + s.ftm;
    let total = 0;
    for(let n in stats){ total += stats[n].pts; }
    score.us = total;
    closeModal();
    refreshUI();
}

function closeModal(){ document.getElementById('editModal').style.display = 'none'; }

function saveGame(){
    if(!confirm("確定要結束並儲存比賽數據嗎？")) return;
    historyData.unshift({ id: Date.now(), info:{...gInfo}, score:{...score}, players:[...players], stats:JSON.parse(JSON.stringify(stats)) });
    localStorage.setItem('basket_pro_v5', JSON.stringify(historyData));
    showToast("比賽數據已存檔 ✓");
    go('history');
}

function drawHistoryList(){
    const container = document.getElementById('hist-list');
    if(historyData.length === 0){ container.innerHTML = "<p style='text-align:center; padding:20px; opacity:0.5;'>尚無歷史紀錄</p>"; return; }
    container.innerHTML = historyData.map((g, i) => `
        <div class="history-item">
            <div class="history-card-header btn-ui" onclick="toggleHistory(this)">
                <div>
                    <small style="color:var(--muted); font-weight:700;">${g.info.date}</small>
                    <div style="font-weight:900; font-size:1.1rem; margin-top:4px;">${g.info.team} ${g.score.us} : ${g.score.them} ${g.info.opp}</div>
                </div>
                <span style="color:var(--gold); font-size:1.2rem;">▼</span>
            </div>
            <div class="history-content">
                <div class="tw">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th><th>姓名</th><th>得分</th>
                                <th>三分(%)</th><th>兩分(%)</th><th>罰球(%)</th>
                                <th>助攻</th><th>火鍋</th><th>抄截</th><th>失誤</th><th>犯規</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${g.players.map(p => {
                                const s = g.stats[p.name];
                                return `<tr><td>${p.num}</td><td>${p.name}</td><td style="color:var(--red); font-weight:bold;">${s.pts}</td><td>${pct(s.f3m, s.f3a)}</td><td>${pct(s.f2m, s.f2a)}</td><td>${pct(s.ftm, s.fta)}</td><td>${s.ast}</td><td>${s.blk}</td><td>${s.stl}</td><td>${s.to}</td><td>${s.foul}</td></tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                <button class="btn-main-red btn-ui" style="margin-top:20px;" onclick="buildCanvas(${i})">🖼 下載戰報圖片</button>
            </div>
        </div>
    `).join('');
}

function toggleHistory(el) {
    const content = el.nextElementSibling;
    const icon = el.querySelector('span');
    content.classList.toggle('active');
    icon.style.transform = content.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
    icon.style.transition = 'transform 0.3s';
}

function buildCanvas(idx){
    const g = historyData[idx];
    document.getElementById('exp-title').innerText = `${g.info.team} VS ${g.info.opp} 賽後數據`;
    document.getElementById('exp-meta').innerText = `${g.info.date} | 比分 ${g.score.us}:${g.score.them}`;
    let html = '';
    g.players.forEach(p => {
        const s = g.stats[p.name];
        html += `<tr><td>${p.num}</td><td>${p.name}</td><td>${s.pts}</td><td>${s.f3m}/${s.f3a}</td><td>${s.f2m}/${s.f2a}</td><td>${s.ftm}/${s.fta}</td><td>${s.ast}</td><td>${s.blk}</td><td>${s.stl}</td><td>${s.to}</td><td>${s.foul}</td></tr>`;
    });
    document.getElementById('exp-body').innerHTML = html;
    html2canvas(document.getElementById('export-area')).then(canvas => {
        const link = document.createElement('a');
        link.download = `戰報_${g.info.date}.png`;
        link.href = canvas.toDataURL();
        link.click();
    });
}

function showToast(msg){
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}
document.getElementById('g-date').value = new Date().toISOString().slice(0,10);
</script>
</body>
</html>
